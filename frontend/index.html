<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11za Smart Real Estate CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">🏡</div>
                <h2>AstroEstate<span>CRM</span></h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><span class="icon">📊</span> Pipeline</a>
                <a href="#" class="nav-item"><span class="icon">👥</span> Agents</a>
                <a href="#" class="nav-item"><span class="icon">⚙️</span> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <p>AI Powered by Gemini</p>
                <div class="status-indicator">
                    <span class="dot"></span> Webhook Active
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles">
                    <h1>Lead Pipeline</h1>
                    <p>Real-time AI qualified leads from WhatsApp.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="refreshBtn">
                        <span class="icon">🔄</span> Refresh Sync
                    </button>
                    <div class="profile-pic">A</div>
                </div>
            </header>

            <div class="kanban-board">
                <!-- Column 1 -->
                <div class="kanban-col" id="col-new">
                    <div class="col-header">
                        <h3>📥 New Inquiries <span class="badge" id="count-new">0</span></h3>
                    </div>
                    <div class="col-cards" data-status="New">
                        <!-- Cards injected via JS -->
                    </div>
                </div>

                <!-- Column 2 -->
                <div class="kanban-col" id="col-qualified">
                    <div class="col-header">
                        <h3>✨ AI Qualified <span class="badge badge-accent" id="count-qualified">0</span></h3>
                    </div>
                    <div class="col-cards" data-status="Qualified">
                        <!-- Artificial Intelligence qualified leads -->
                    </div>
                </div>

                <!-- Column 3 -->
                <div class="kanban-col" id="col-contacted">
                    <div class="col-header">
                        <h3>🤝 Contacted <span class="badge" id="count-contacted">0</span></h3>
                    </div>
                    <div class="col-cards" data-status="Contacted">
                        
                    </div>
                </div>

                <!-- Column 4 -->
                <div class="kanban-col" id="col-closed">
                    <div class="col-header">
                        <h3>🏆 Closed Deals <span class="badge badge-success" id="count-closed">0</span></h3>
                    </div>
                    <div class="col-cards" data-status="Closed">
                        
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for a Lead Card -->
    <template id="card-template">
        <div class="lead-card" draggable="true">
            <div class="card-top">
                <span class="phone-number"></span>
                <span class="time-ago"></span>
            </div>
            <div class="card-body">
                <div class="info-row">
                    <span class="icon">📍</span> <span class="location-txt"></span>
                </div>
                <div class="info-row">
                    <span class="icon">💰</span> <span class="budget-txt"></span>
                </div>
                <div class="info-row">
                    <span class="icon">🏢</span> <span class="type-txt"></span>
                </div>
            </div>
            <div class="card-footer">
                <button class="btn-action">WhatsApp</button>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
